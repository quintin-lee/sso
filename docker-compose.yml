version: '3.8'

services:
  sso:
    build: .
    container_name: sso_service
    environment:
      - SSO_TOKEN_SECRET=your_super_secret_key_32chars_at_least
      - SSO_ADMIN_PASSWORD=admin123
    volumes:
      - sso_data:/app/data
      - ./audit.log:/app/audit.log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  gogs:
    image: gogs/gogs:latest
    container_name: gogs_service
    volumes:
      - gogs_data:/data
      - ./gogs/conf/app.ini:/data/gogs/conf/app.ini
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      sso:
        condition: service_healthy
      gogs:
        condition: service_started
    restart: unless-stopped

volumes:
  sso_data:
  gogs_data:
