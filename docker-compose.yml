services:
  sso:
    build:
      context: .
      args:
        DOCKER_REGISTRY: docker.1ms.run/library/
        USE_CHINA_MIRROR: 1
    container_name: sso_system
    ports:
      - "80:80"
    environment:
      - SSO_TOKEN_SECRET=your_super_secret_key_32chars_at_least
      - SSO_ADMIN_PASSWORD=admin123
      - SSO_DATABASE_URL=postgres://sso:sso_pass@db:5432/sso?sslmode=disable
      - SSO_DATABASE_TYPE=postgres
      - SSO_AUDIT_LOG_PATH=/app/data/audit.log
    volumes:
      - sso_data:/app/data
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: docker.1ms.run/library/postgres:15-alpine
    container_name: sso_db
    environment:
      - POSTGRES_USER=sso
      - POSTGRES_PASSWORD=sso_pass
      - POSTGRES_DB=sso
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gogs:
    image: docker.1ms.run/gogs/gogs:latest
    container_name: gogs_service
    volumes:
      - gogs_data:/data
      - ./gogs/conf/app.ini:/data/gogs/conf/app.ini
    restart: unless-stopped

volumes:
  sso_data:
  postgres_data:
  gogs_data:
