version: '3.8'

services:
  sso:
    build: .
    container_name: sso_system
    ports:
      - "80:80"
    environment:
      - SSO_TOKEN_SECRET=your_super_secret_key_32chars_at_least
      - SSO_ADMIN_PASSWORD=admin123
      - DATABASE_URL=postgres://sso:sso_pass@db:5432/sso?sslmode=disable
    volumes:
      - sso_data:/app/data
      - ./audit.log:/app/audit.log
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: sso_db
    environment:
      - POSTGRES_USER=sso
      - POSTGRES_PASSWORD=sso_pass
      - POSTGRES_DB=sso
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sso"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gogs:
    image: gogs/gogs:latest
    container_name: gogs_service
    volumes:
      - gogs_data:/data
      - ./gogs/conf/app.ini:/data/gogs/conf/app.ini
    restart: unless-stopped

volumes:
  sso_data:
  postgres_data:
  gogs_data:
