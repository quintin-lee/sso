version: '3.8'

services:
  sso:
    build: .
    container_name: sso_service
    environment:
      - SSO_TOKEN_SECRET=your_super_secret_key_32chars_at_least
      - SSO_ADMIN_PASSWORD=admin123
    volumes:
      - sso_data:/app/data
      - ./audit.log:/app/audit.log
    restart: unless-stopped

  gogs:
    image: gogs/gogs:latest
    container_name: gogs_service
    volumes:
      - gogs_data:/data
      - ./gogs/conf/app.ini:/data/gogs/conf/app.ini
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sso
      - gogs
    restart: unless-stopped

volumes:
  sso_data:
  gogs_data:
