<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SSO 管理后台</title>
<style>
:root{
  --bg-dark:#0a0b10;
  --bg-card:#161922;
  --bg-input:#1f222d;
  --border:#2a2e3a;
  --accent:#7aa2f7;
  --accent-light:#bb9af7;
  --accent-gradient:linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%);
  --text-main:#a9b1d6;
  --text-muted:#565f89;
  --text-bright:#c0caf5;
  --success:#9ece6a;
  --danger:#f7768e;
  --shadow:0 10px 30px rgba(0,0,0,0.5);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg-dark);
  color:var(--text-main);
  font-family:'Inter', system-ui, -apple-system, sans-serif;
  display:none; /* Hidden until auth */
  height:100vh;
  overflow:hidden;
}
/* Layout */
.sidebar{
  width:280px;
  background:var(--bg-card);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  padding:32px 0;
}
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.header{
  height:80px;
  padding:0 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.content-area{
  flex:1;
  overflow-y:auto;
  padding:40px;
}
/* Components */
.logo{
  padding:0 32px;
  margin-bottom:40px;
  display:flex;
  align-items:center;
  gap:12px;
}
.logo-icon{
  width:32px;
  height:32px;
  background:var(--accent-gradient);
  border-radius:8px;
}
.logo-text{
  font-size:20px;
  font-weight:800;
  color:#fff;
  letter-spacing:-0.5px;
}
.nav-item{
  padding:14px 32px;
  display:flex;
  align-items:center;
  gap:16px;
  color:var(--text-muted);
  cursor:pointer;
  transition:all 0.2s;
  font-weight:600;
  font-size:15px;
}
.nav-item:hover{
  color:var(--text-bright);
  background:rgba(255,255,255,0.03);
}
.nav-item.active{
  color:var(--accent);
  background:rgba(122,162,247,0.1);
  border-right:3px solid var(--accent);
}
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 1fr));
  gap:24px;
  margin-bottom:40px;
}
.stat-card{
  background:var(--bg-card);
  padding:24px;
  border-radius:var(--radius);
  border:1px solid var(--border);
}
.stat-label{
  font-size:13px;
  color:var(--text-muted);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:1px;
}
.stat-value{
  font-size:28px;
  font-weight:800;
  color:#fff;
}
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.card-header{
  padding:24px 32px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.card-title{
  font-size:18px;
  font-weight:700;
  color:var(--text-bright);
}
.table-wrapper{
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
}
th{
  background:rgba(0,0,0,0.15);
  padding:14px 32px;
  text-align:left;
  font-size:12px;
  text-transform:uppercase;
  color:var(--text-muted);
  font-weight:700;
  letter-spacing:1px;
}
td{
  padding:18px 32px;
  border-bottom:1px solid var(--border);
  font-size:14px;
  color:var(--text-main);
}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.015)}
/* Components */
.btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 20px;
  border-radius:var(--radius);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  border:none;
  outline:none;
}
.btn-primary{
  background:var(--accent-gradient);
  color:#fff;
  box-shadow:0 4px 15px rgba(122,162,247,0.3);
}
.btn-outline{
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-main);
}
.btn-outline:hover{
  border-color:var(--accent);
  color:var(--accent);
}
.btn-danger{
  background:rgba(247,118,142,0.1);
  color:var(--danger);
  border:1px solid rgba(247,118,142,0.2);
}
.btn-danger:hover{
  background:var(--danger);
  color:#fff;
}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
.tag{
  padding:4px 10px;
  background:rgba(122,162,247,0.1);
  color:var(--accent);
  border-radius:6px;
  font-size:12px;
  font-weight:700;
}
.status-pill{
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-size:12px;
  font-weight:700;
}
.status-active{color:var(--success)}
.status-inactive{color:var(--text-muted)}
/* Modal */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:all 0.3s;
  z-index:100;
}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal{
  background:var(--bg-card);
  width:500px;
  border-radius:24px;
  border:1px solid var(--border);
  padding:40px;
  transform:translateY(20px);
  transition:all 0.3s;
}
.modal-overlay.active .modal{transform:translateY(0)}
.modal-title{font-size:24px;font-weight:800;color:#fff;margin-bottom:8px}
.modal-sub{color:var(--text-muted);font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase}
.form-input{
  width:100%;
  background:var(--bg-input);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
  color:#fff;
  font-size:14px;
  transition:all 0.2s;
}
.form-input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 4px rgba(122,162,247,0.1)}
/* Search */
.search-box{
  background:var(--bg-input);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:8px 16px;
  display:flex;
  align-items:center;
  gap:12px;
  width:320px;
}
.search-input{
  background:transparent;
  border:none;
  color:#fff;
  font-size:14px;
  width:100%;
}
.search-input:focus{outline:none}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <div class="logo-icon"></div>
    <div class="logo-text">SSO ADMIN</div>
  </div>
  <div class="nav-item active" onclick="showTab('users', this)">用户管理</div>
  <div class="nav-item" onclick="showTab('roles', this)">角色管理</div>
  <div class="nav-item" onclick="showTab('groups', this)">组织架构</div>
  <div class="nav-item" onclick="showTab('policies', this)">权限策略</div>
  <div class="nav-item" onclick="showTab('audit', this)">审计日志</div>
  <div class="nav-item" onclick="showTab('metrics', this)">系统指标</div>
  <div style="margin-top:auto;padding:0 24px">
    <button class="btn btn-outline" style="width:100%;justify-content:center" onclick="logout()">安全退出</button>
  </div>
</div>
<div class="main-content">
  <div class="header">
    <div style="display:flex;align-items:center;gap:32px">
      <h1 id="pageTitle" style="font-size:24px;font-weight:800;color:#fff">用户管理</h1>
      <div class="search-box">
        <input type="text" class="search-input" placeholder="全局搜索..." id="searchInput" oninput="handleSearch(this.value)">
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:20px">
      <div style="text-align:right">
        <div id="adminName" style="color:#fff;font-weight:700;font-size:14px">管理员</div>
        <div style="color:var(--text-muted);font-size:12px">超级管理员</div>
      </div>
      <div id="avatar" style="width:44px;height:44px;background:var(--accent-gradient);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800">A</div>
    </div>
  </div>
  <div class="content-area">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">总用户数</div>
        <div class="stat-value" id="countUsers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">活跃会话</div>
        <div class="stat-value" id="countSessions">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">决策次数</div>
        <div class="stat-value" id="totalEvals">0</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <div class="card-title">列表详情</div>
        <button class="btn btn-primary" id="addBtn">+ 新增用户</button>
      </div>
      <div class="table-wrapper" id="tableContainer">
        <!-- Table injected here -->
      </div>
      <div id="pagination" style="padding:20px 32px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:13px;color:var(--text-muted)" id="pageInfo">第 1 页</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm" onclick="prevPage()">上一页</button>
          <button class="btn btn-outline btn-sm" onclick="nextPage()">下一页</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 class="modal-title" id="modalTitle">新增用户</h2>
    <p class="modal-sub" id="modalSub">请填写以下信息以创建新实体</p>
    <div id="formContainer"></div>
    <div style="display:flex;gap:12px;margin-top:32px">
      <button class="btn btn-outline" style="flex:1;justify-content:center" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" style="flex:1;justify-content:center" id="saveBtn">保存提交</button>
    </div>
  </div>
</div>

<script>
const TOKEN_KEY = 'sso_token';
const LIMIT = 10;
let allData = { users:[], roles:[], groups:[], policies:[] };
let state = {
  users: { page: 1, q: '', status: -1, total: 0 },
  roles: { page: 1, q: '', total: 0 },
  groups: { page: 1, q: '', total: 0 },
  policies: { page: 1, q: '', total: 0 },
  audit: { page: 1, q: '', total: 0 }
};
let currentTab = 'users';

function toast(msg, type='success') {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;top:24px;right:24px;padding:16px 24px;background:var(--bg-card);border:1px solid ${type==='success'? 'var(--success)':'var(--danger)'};border-radius:12px;box-shadow:var(--shadow);z-index:200;color:#fff;font-weight:600;font-size:14px;display:flex;align-items:center;gap:10px;transform:translateX(100px);opacity:0;transition:all 0.3s`;
  t.innerHTML = (type==='success'?'✅':'❌') + ' ' + msg;
  document.body.appendChild(t);
  setTimeout(()=> { t.style.transform='translateX(0)'; t.style.opacity='1'; }, 10);
  setTimeout(()=> { t.style.transform='translateX(100px)'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
}

async function api(path, method='GET', body=null) {
  const token = localStorage.getItem(TOKEN_KEY);
  const headers = {'Content-Type':'application/json'};
  if(token) headers['Authorization'] = 'Bearer ' + token;
  try {
    const r = await fetch(path, {method, headers, body: body ? JSON.stringify(body) : null});
    if(r.status === 401) { logout(); return; }
    
    // Extract new tokens from headers if present
    const accessToken = r.headers.get('X-SSO-Access-Token');
    if(accessToken) localStorage.setItem(TOKEN_KEY, accessToken);
    
    const data = await r.json();
    if(!r.ok) throw new Error(data.error || '请求失败');
    return data;
  } catch(e) { toast(e.message, 'error'); throw e; }
}

function loadData() {
  const container = document.getElementById('tableContainer');
  container.innerHTML = '<div style="padding:60px;text-align:center;color:var(--text-muted)">加载中...</div>';

  const s = state[currentTab] || { page: 1, q: '', status: -1 };
  const query = `?page=${s.page}&limit=${LIMIT}&q=${encodeURIComponent(s.q)}&status=${s.status}`;

  if(currentTab === 'users') {
    api('api/v1/users' + query).then(res => {
      const data = res.items;
      state.users.total = res.total;
      allData.users = data;
      updatePaginationUI();
      document.getElementById('countUsers').textContent = res.total;
      let html = '<table><thead><tr><th>ID</th><th>用户名</th><th>显示名称</th><th>状态</th><th>角色/分组</th><th>操作</th></tr></thead><tbody>';
      data.forEach(u => {
        const roles = (u.roles || []).map(r => `<span class="tag">${r.name}</span>`).join('');
        html += `<tr><td>#${u.id}</td><td style="color:var(--text-bright);font-weight:600">${u.username}</td><td>${u.display_name||'-'}</td><td><span class="status-pill ${u.status === 1 ? 'status-active' : 'status-inactive'}">${u.status === 1 ? '● 正常' : '● 禁用'}</span></td><td>${roles||'-'}</td><td>
          <button class="btn btn-outline btn-sm" onclick="showEditUser(${u.id})">编辑</button>
          <button class="btn btn-outline btn-sm" onclick="showAssignments(${u.id})">角色/群组</button>
          <button class="btn btn-danger btn-sm" onclick="deleteItem('users', ${u.id})">删除</button></td></tr>`;
      });
      container.innerHTML = html + '</tbody></table>';
    });
  } else if(currentTab === 'roles') {
    api('api/v1/roles' + query).then(res => {
      const data = res.items;
      state.roles.total = res.total;
      allData.roles = data;
      updatePaginationUI();
      let html = '<table><thead><tr><th>ID</th><th>名称</th><th>描述</th><th>创建时间</th><th>操作</th></tr></thead><tbody>';
      data.forEach(r => {
        html += `<tr><td>#${r.id}</td><td style="color:var(--text-bright);font-weight:600">${r.name}</td><td>${r.description}</td><td>${new Date(r.created_at*1000).toLocaleString()}</td><td>
          <button class="btn btn-outline btn-sm" onclick="showEditRole(${r.id})">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteItem('roles', ${r.id})">删除</button></td></tr>`;
      });
      container.innerHTML = html + '</tbody></table>';
    });
  } else if(currentTab === 'policies') {
    api('api/v1/policies' + query).then(res => {
      const data = res.items;
      state.policies.total = res.total;
      allData.policies = data;
      updatePaginationUI();
      let html = '<table><thead><tr><th>ID</th><th>名称</th><th>策略类型</th><th>生效</th><th>优先级</th><th>规则详情</th><th>操作</th></tr></thead><tbody>';
      data.forEach(p => {
        html += `<tr><td>#${p.id}</td><td style="color:var(--text-bright);font-weight:600">${p.name}</td><td><span class="tag">${p.strategy_name}</span></td><td><span class="tag" style="background:rgba(158,206,106,0.1);color:var(--success)">ALLOW</span></td><td>${p.priority}</td><td style="font-family:monospace;font-size:12px">${p.rules}</td><td>
          <button class="btn btn-outline btn-sm" onclick="showEditPolicy(${p.id})">编辑</button>
          <button class="btn btn-danger btn-sm" onclick="deleteItem('policies', ${p.id})">删除</button></td></tr>`;
      });
      container.innerHTML = html + '</tbody></table>';
    });
  } else if(currentTab === 'audit') {
    api('api/v1/audit' + query).then(res => {
      const data = res.items;
      state.audit.total = res.total;
      updatePaginationUI();
      let html = '<table><thead><tr><th>时间</th><th>用户ID</th><th>决策</th><th>耗时</th><th>路径/追踪</th></tr></thead><tbody>';
      data.forEach(log => {
        html += `<tr><td style="font-size:12px">${new Date(log.timestamp_ms).toLocaleString()}</td><td>#${log.user_id}</td><td><span class="tag" style="background:${log.decision==='ALLOW'?'rgba(158,206,106,0.1)':'rgba(247,118,142,0.1)'};color:${log.decision==='ALLOW'?'var(--success)':'var(--danger)'}">${log.decision}</span></td><td>${log.duration_ms}ms</td><td style="font-family:monospace;font-size:12px">${log.trace}</td></tr>`;
      });
      container.innerHTML = html + '</tbody></table>';
    });
  } else if(currentTab === 'metrics') {
    updatePaginationUI();
    fetch('metrics').then(r => r.text()).then(m => {
      container.innerHTML = `<pre style="padding:32px;background:var(--bg-dark);color:#79dac8;font-family:monospace;font-size:13px">${m}</pre>`;
      const match = m.match(/sso_perm_evals_total (\d+)/);
      if(match) document.getElementById('totalEvals').textContent = match[1];
    });
  }
}

function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  const labels = { users:'用户管理', roles:'角色管理', groups:'组织架构', policies:'权限策略', audit:'审计日志', metrics:'系统指标' };
  document.getElementById('pageTitle').textContent = labels[tab];
  const addBtn = document.getElementById('addBtn');
  addBtn.textContent = '+ 新增' + labels[tab].substring(0, 2);
  addBtn.style.display = (tab === 'metrics' || tab === 'audit') ? 'none' : 'flex';
  loadData();
}

function handleSearch(q) {
  state[currentTab].q = q;
  state[currentTab].page = 1;
  loadData();
}

function prevPage() { if(state[currentTab].page > 1) { state[currentTab].page--; loadData(); } }
function nextPage() { if(state[currentTab].page * LIMIT < state[currentTab].total) { state[currentTab].page++; loadData(); } }

function updatePaginationUI() {
  const s = state[currentTab];
  document.getElementById('pagination').style.display = (currentTab === 'metrics') ? 'none' : 'flex';
  document.getElementById('pageInfo').textContent = `第 ${s.page} 页 / 共 ${Math.ceil(s.total/LIMIT)||1} 页 (${s.total} 条记录)`;
}

function logout() { localStorage.removeItem(TOKEN_KEY); window.location.href = './'; }
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function showModal(title, sub) { document.getElementById('modalTitle').textContent=title; document.getElementById('modalSub').textContent=sub; document.getElementById('modalOverlay').classList.add('active'); }

// Init
let token = localStorage.getItem(TOKEN_KEY);
if(window.location.hash) {
  token = decodeURIComponent(window.location.hash.substring(1));
  localStorage.setItem(TOKEN_KEY, token);
  window.location.hash = '';
}

if(token) {
  api('api/v1/auth/me').then(async d => {
    // Robust check: fetch full user details to confirm roles
    const u = await api(`api/v1/users/${d.id}`);
    const isAdmin = (u.roles || []).some(r => r.name === 'admin');
    
    if(!isAdmin) {
      alert('权限不足：仅管理员可以访问此页面');
      logout();
      return;
    }
    document.getElementById('adminName').textContent = d.display_name || d.username;
    document.getElementById('avatar').textContent = (d.display_name || d.username)[0].toUpperCase();
    document.body.style.display = 'flex'; // Unlock UI
    loadData();
    api('api/v1/admin/status').then(s => {
      document.getElementById('countSessions').textContent = s.active_sessions || 0;
    });
  }).catch(() => { logout(); });
} else { window.location.href = './'; }
</script>
</body>
</html>
