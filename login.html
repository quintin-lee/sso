<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SSO 统一身份认证</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-dark:#0f111a;
  --bg-card:#161925;
  --bg-input:#1f2335;
  --accent:#7aa2f7;
  --accent-glow:rgba(122,162,247,0.3);
  --text-main:#a9b1d6;
  --text-bright:#c0caf5;
  --text-muted:#565f89;
  --border:#292e42;
  --error:#f7768e;
  --radius:12px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg-dark);
  color:var(--text-main);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
body::before{
  content:'';
  position:absolute;
  width:1000px;height:1000px;
  background:radial-gradient(circle, rgba(122,162,247,0.05) 0%, transparent 70%);
  top:-200px;right:-200px;
  pointer-events:none;
}
body::after{
  content:'';
  position:absolute;
  width:800px;height:800px;
  background:radial-gradient(circle, rgba(187,154,247,0.03) 0%, transparent 70%);
  bottom:-200px;left:-200px;
  pointer-events:none;
}
.login-card{
  width:400px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.02);
  z-index:10;
  position:relative;
}
.logo-area{
  text-align:center;
  margin-bottom:40px;
}
.logo-icon{
  width:48px;height:48px;
  background:linear-gradient(135deg, #7aa2f7, #bb9af7);
  border-radius:12px;
  display:inline-flex;align-items:center;justify-content:center;
  color:#fff;font-weight:bold;font-size:24px;
  margin-bottom:16px;
  box-shadow:0 0 20px rgba(122,162,247,0.4);
}
h1{font-size:24px;color:var(--text-bright);font-weight:700;letter-spacing:-0.5px}
.subtitle{font-size:14px;color:var(--text-muted);margin-top:8px}

.tabs{
  display:flex;background:var(--bg-dark);padding:4px;border-radius:10px;
  margin-bottom:32px;border:1px solid var(--border);
}
.tab{
  flex:1;text-align:center;padding:8px;font-size:13px;cursor:pointer;
  border-radius:8px;transition:all 0.2s;color:var(--text-muted);
}
.tab.active{background:var(--bg-input);color:var(--accent);font-weight:600}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
input{
  width:100%;background:var(--bg-input);border:1px solid var(--border);
  padding:14px 16px;border-radius:var(--radius);color:var(--text-bright);
  font-size:15px;transition:all 0.2s;outline:none;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
input::placeholder{color:var(--text-muted)}

.btn{
  width:100%;padding:14px;border-radius:var(--radius);border:none;
  font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-primary{background:linear-gradient(135deg, #7aa2f7, #bb9af7);color:#fff;margin-top:10px}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}

.sms-input-row{display:flex;gap:10px}
.btn-sms{width:auto;white-space:nowrap;background:var(--bg-input);color:var(--text-bright);border:1px solid var(--border);font-size:13px}
.btn-sms:disabled{color:var(--text-muted);cursor:not-allowed}

.error-bar{
  background:rgba(247,118,142,0.1);color:var(--error);
  padding:12px;border-radius:8px;font-size:13px;margin-bottom:20px;
  display:none;border-left:4px solid var(--error);
}
.error-bar.visible{display:block}

.switch-footer{text-align:center;margin-top:32px;font-size:13px;color:var(--text-muted)}
.switch-footer span{color:var(--accent);cursor:pointer;font-weight:500}
.switch-footer span:hover{text-decoration:underline}

/* Success UI */
.success-view{display:none;text-align:center}
.token-box{
  background:var(--bg-dark);border:1px solid var(--border);
  border-radius:12px;padding:16px;margin:24px 0;
  font-family:monospace;font-size:11px;word-break:break-all;
  color:var(--accent);max-height:100px;overflow-y:auto;text-align:left;
}
</style>
</head>
<body>

<div class="login-card" id="card">
  <!-- Login State -->
  <div id="loginView">
    <div class="logo-area">
      <div class="logo-icon">S</div>
      <h1>SSO 统一认证</h1>
      <div class="subtitle">Securely access your services</div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('pass')">密码登录</div>
      <div class="tab" onclick="switchTab('sms')">验证码登录</div>
    </div>

    <div id="errorBar" class="error-bar"></div>

    <form id="passForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">进入系统</button>
    </form>

    <form id="smsForm" style="display:none">
      <div class="form-group">
        <label>手机号</label>
        <div class="sms-input-row">
          <input type="tel" id="phone" placeholder="138xxxx8888">
          <button type="button" class="btn btn-sms" id="smsBtn">获取验证码</button>
        </div>
      </div>
      <div class="form-group">
        <label>验证码</label>
        <input type="text" id="code" placeholder="6位数字" maxlength="6">
      </div>
      <button type="submit" class="btn btn-primary">登录 / 快速注册</button>
    </form>

    <div class="switch-footer">
      还没有账号？<span onclick="toggleMode('reg')">立即注册</span>
    </div>
  </div>

  <!-- Register State -->
  <div id="regView" style="display:none">
    <div class="logo-area">
      <div class="logo-icon">S</div>
      <h1>创建账号</h1>
      <div class="subtitle">Join our secure platform</div>
    </div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="r_user" placeholder="字母、数字组合">
    </div>
    <div class="form-group">
      <label>显示名称</label>
      <input type="text" id="r_name" placeholder="您的姓名或昵称">
    </div>
    <div class="form-group">
      <label>设置密码</label>
      <input type="password" id="r_pass" placeholder="最少6位字符">
    </div>
    <button class="btn btn-primary" onclick="doRegister()">创建我的账号</button>
    <div class="switch-footer">
      已有账号？<span onclick="toggleMode('login')">返回登录</span>
    </div>
  </div>

  <!-- Success State -->
  <div id="successView" class="success-view">
    <div class="logo-area">
      <div style="font-size:48px;margin-bottom:16px">✅</div>
      <h1>认证成功</h1>
      <div class="subtitle">您已获得系统访问权限</div>
    </div>
    <div class="token-box" id="tokenDisplay"></div>
    <div style="display:flex;gap:10px">
      <a href="/admin" id="adminLink" class="btn btn-primary" style="flex:1;text-decoration:none">管理后台</a>
      <button class="btn btn-sms" onclick="location.reload()">重新登录</button>
    </div>
  </div>
</div>

<div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:2000"></div>

<script>
let mode = 'pass';
const errorBar = document.getElementById('errorBar');

function toast(msg, type='success') {
  const container = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.style.padding = '12px 24px';
  t.style.borderRadius = '8px';
  t.style.background = 'var(--bg-card)';
  t.style.color = '#fff';
  t.style.border = '1px solid var(--border)';
  t.style.boxShadow = '0 10px 30px rgba(0,0,0,0.5)';
  t.style.marginBottom = '10px';
  t.style.borderLeft = `4px solid var(--${type === 'success' ? 'success' : 'error'})`;
  t.textContent = msg;
  t.style.transition = 'opacity 0.3s';
  container.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

function switchTab(t) {
  mode = t;
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', (t==='pass' && i===0) || (t==='sms' && i===1)));
  document.getElementById('passForm').style.display = t === 'pass' ? 'block' : 'none';
  document.getElementById('smsForm').style.display = t === 'sms' ? 'block' : 'none';
  errorBar.className = 'error-bar';
}

function toggleMode(m) {
  document.getElementById('loginView').style.display = m === 'reg' ? 'none' : 'block';
  document.getElementById('regView').style.display = m === 'reg' ? 'block' : 'none';
}

function showError(m) {
  errorBar.textContent = m;
  errorBar.className = 'error-bar visible';
}

// APIs
async function post(url, data) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
  const json = await r.json();
  if(!r.ok) throw new Error(json.error || '请求失败');
  return json;
}

document.getElementById('passForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const res = await post('api/v1/auth/login', {username:document.getElementById('username').value, password:document.getElementById('password').value});
    onSuccess(res);
  } catch(e) { showError(e.message); }
};

document.getElementById('smsBtn').onclick = async () => {
  const phone = document.getElementById('phone').value;
  if(phone.length < 11) return showError('请输入正确的手机号');
  try {
    await post('api/v1/auth/send_sms', {phone});
    let s = 60;
    const btn = document.getElementById('smsBtn');
    btn.disabled = true;
    const timer = setInterval(() => {
      btn.textContent = `${--s}s`;
      if(s <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = '获取验证码'; }
    }, 1000);
  } catch(e) { showError(e.message); }
};

document.getElementById('smsForm').onsubmit = async (e) => {
  e.preventDefault();
  try {
    const res = await post('api/v1/auth/login_by_sms', {phone:document.getElementById('phone').value, code:document.getElementById('code').value});
    onSuccess(res);
  } catch(e) { showError(e.message); }
};

async function doRegister() {
  try {
    const res = await post('api/v1/auth/register', {
      username: document.getElementById('r_user').value, 
      password: document.getElementById('r_pass').value, 
      display_name: document.getElementById('r_name').value
    });
    toast('注册成功，请登录');
    toggleMode('login');
    document.getElementById('username').value = res.username;
    document.getElementById('password').focus();
  } catch(e) { showError(e.message); }
}

function onSuccess(res) {
  localStorage.setItem('sso_token', res.token);
  // Set cookie for Nginx auth_request
  document.cookie = `sso_token=${res.token}; path=/; max-age=3600; SameSite=Lax`;

  const params = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect');
  if (redirect) {
    window.location.href = redirect;
    return;
  }

  document.getElementById('loginView').style.display = 'none';
  document.getElementById('successView').style.display = 'block';
  document.getElementById('tokenDisplay').textContent = res.token;
  document.getElementById('adminLink').href = `admin#${encodeURIComponent(res.token)}`;
}

// Redirect if already has token
const t = localStorage.getItem('sso_token');
if(t) {
  fetch('api/v1/auth/verify', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})})
    .then(r => r.json()).then(d => { if(d.valid) onSuccess({token:t}); });
}
</script>
</body>
</html>
