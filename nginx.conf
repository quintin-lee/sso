worker_processes 1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream sso_backend {
        server sso:8080;
    }

    upstream gogs_backend {
        server gogs:3000;
    }

    server {
        listen       80;
        server_name  localhost;

        # SSO API and Login Page
        location /sso/ {
            rewrite ^/sso/(.*) /$1 break;
            proxy_pass http://sso_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Fix redirects from backend
            proxy_redirect / /sso/;
        }

        # Redirect /sso to /sso/
        location = /sso {
            return 301 /sso/;
        }

        # Gogs protected by SSO
        location / {
            set $user "";
            set $email "";
            auth_request /auth-verify;
            
            # Capture headers from SSO response
            auth_request_set $user $upstream_http_x_sso_user;
            auth_request_set $email $upstream_http_x_sso_email;

            # Pass to Gogs
            proxy_set_header X-WEBAUTH-USER $user;
            proxy_set_header X-WEBAUTH-EMAIL $email;

            # Debugging (See these in Browser F12)
            add_header X-Debug-User "$user" always;
            add_header X-Debug-Email "$email" always;

            proxy_pass http_gogs_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Error page for 401: redirect to SSO login
            error_page 401 = @error401;
        }

        location /auth-verify {
            internal;
            proxy_pass http://sso_backend/api/v1/auth/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization "Bearer $cookie_sso_token";
        }

        location @error401 {
            return 302 /sso/?redirect=$request_uri;
        }
    }
}
