worker_processes 1;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Frontend SPA support
        location / {
            try_files $uri $uri/ /index.html;
        }

        # SSO API
        location /api/v1/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OIDC Discovery
        location /.well-known/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Metrics
        location /metrics {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }



        # Internal auth_request endpoint — extracts sso_token cookie and sets it
        # as the Authorization: Bearer header for the SSO backend.
        location = /_internal/auth/session-check {
            internal;
            proxy_method GET;
            proxy_pass http://127.0.0.1:8080/api/v1/auth/session-check;
            proxy_set_header Authorization "Bearer $cookie_sso_token";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # Gogs instance — gogs.localhost, protected by SSO auth_request
        location /gogs/ {
            auth_request /_internal/auth/session-check;
            auth_request_set $sso_user $upstream_http_x_sso_user;
            auth_request_set $sso_email $upstream_http_x_sso_email;
            auth_request_set $sso_user_id $upstream_http_x_sso_user_id;

            # 401 → redirect to SSO login page; after login, return to Gogs
            error_page 401 = @gogs_login_redirect;

            proxy_pass http://gogs:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-SSO-User $sso_user;
            proxy_set_header X-SSO-Email $sso_email;
            proxy_set_header X-SSO-User-Id $sso_user_id;

            # Forward the SSO token as Bearer token in Authorization header
            proxy_set_header Authorization "Bearer $cookie_sso_token";

            # Gogs-specific
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location @gogs_login_redirect {
            return 302 http://localhost/login?redirect=$scheme://$http_host/gogs/;
        }
    }
}
