BRAND_NAME = Gogs
RUN_USER   = git
RUN_MODE   = prod

[auth]
ENABLE_REVERSE_PROXY_AUTHENTICATION    = true
REVERSE_PROXY_AUTHENTICATION_HEADER    = X-SSO-User
ENABLE_REVERSE_PROXY_AUTO_REGISTRATION = true
REQUIRE_EMAIL_CONFIRMATION             = false
DISABLE_REGISTRATION                   = false
ENABLE_REGISTRATION_CAPTCHA            = true
REQUIRE_SIGNIN_VIEW                    = false

[server]
DOMAIN                        = localhost
HTTP_PORT                     = 3000
ROOT_URL                      = http://localhost/gogs/
EXTERNAL_URL                  = http://localhost/gogs/
DISABLE_SSH                   = false
SSH_PORT                      = 22
OFFLINE_MODE                  = false
START_SSH_SERVER              = false

[database]
TYPE     = sqlite3
PATH     = /data/gogs/gogs.db
HOST     = 127.0.0.1:5432
NAME     = gogs
SCHEMA   = public
USER     = gogs
PASSWORD = 
SSL_MODE = disable

[repository]
ROOT           = /data/git/gogs-repositories
DEFAULT_BRANCH = master

[email]
ENABLED = false

[user]
ENABLE_EMAIL_NOTIFICATION = false

[picture]
DISABLE_GRAVATAR        = false
ENABLE_FEDERATED_AVATAR = false

[session]
PROVIDER = file

[log]
MODE      = file
LEVEL     = Info
ROOT_PATH = /app/gogs/log

[security]
INSTALL_LOCK = true
SECRET_KEY   = MHGTOan7KgU5Rg2
REVERSE_PROXY_TRUST_LOCAL     = true
REVERSE_PROXY_TRUSTED_PROXIES = 127.0.0.1,::1,172.0.0.0/8,192.168.0.0/16,10.0.0.0/8
