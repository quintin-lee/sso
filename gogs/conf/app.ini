[auth]
ENABLE_REVERSE_PROXY_AUTH = true
REVERSE_PROXY_AUTH_USER = X-WEBAUTH-USER

[security]
INSTALL_LOCK = true
SECRET_KEY = change_me_to_something_random

[server]
DOMAIN = localhost
HTTP_PORT = 3000
EXTERNAL_URL = http://localhost/
DISABLE_SSH = false
SSH_PORT = 22
OFFLINE_MODE = false

[database]
TYPE = sqlite3
PATH = /data/gogs/gogs.db
