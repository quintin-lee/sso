# docker-compose.raft.yml — SSO Raft Consensus Cluster
#
# Spins up a 3-node SSO Raft cluster using SQLite as the underlying storage.
# The nodes automatically discover each other and elect a leader.

services:
  node1:
    build:
      context: .
      args:
        # NOTE: For pipeline builds, remove these args to use standard Docker Hub mirrors
        DOCKER_REGISTRY: docker.1ms.run/library/
        USE_CHINA_MIRROR: 1
    container_name: sso_node1
    hostname: node1
    ports:
      - "8081:80"
    environment:
      - SSO_TOKEN_SECRET=RAFT_CLUSTER_SECRET
    volumes:
      - ./docker-raft/node1.toml:/app/sso.toml
      - sso_node1_data:/app/data
    restart: unless-stopped

  node2:
    build:
      context: .
      args:
        DOCKER_REGISTRY: docker.1ms.run/library/
        USE_CHINA_MIRROR: 1
    container_name: sso_node2
    hostname: node2
    ports:
      - "8082:80"
    environment:
      - SSO_TOKEN_SECRET=RAFT_CLUSTER_SECRET
    volumes:
      - ./docker-raft/node2.toml:/app/sso.toml
      - sso_node2_data:/app/data
    restart: unless-stopped

  node3:
    build:
      context: .
      args:
        DOCKER_REGISTRY: docker.1ms.run/library/
        USE_CHINA_MIRROR: 1
    container_name: sso_node3
    hostname: node3
    ports:
      - "8083:80"
    environment:
      - SSO_TOKEN_SECRET=RAFT_CLUSTER_SECRET
    volumes:
      - ./docker-raft/node3.toml:/app/sso.toml
      - sso_node3_data:/app/data
    restart: unless-stopped

volumes:
  sso_node1_data:
  sso_node2_data:
  sso_node3_data:
