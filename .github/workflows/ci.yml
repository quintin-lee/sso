name: C/C++ CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libsqlite3-dev \
          libsodium-dev \
          libssl-dev \
          libcurl4-openssl-dev \
          libmicrohttpd-dev \
          libpq-dev \
          libhiredis-dev

    - name: Build the project (release)
      run: make

    - name: Check that MHD was detected
      run: |
        make -n 2>&1 | grep -q server_mhd && echo "MHD detected: using server_mhd.c" || echo "MHD not detected (fallback to server.c)"
        # Verify binary was compiled with USE_LIBMICROHTTPD
        nm sso_system | grep -q MHD_start_daemon && echo "MHD linked: OK" || echo "MHD not linked"

    - name: Build and run unit test suite
      run: make test

    - name: Build with AddressSanitizer
      run: make asan

    - name: Run integrated (smoke test)
      run: |
        ./sso_system < /dev/null

    - name: Run HTTP API integration tests
      run: make integration-test
      env:
        SSO_TEST_PORT: 18080

  static-analysis:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install cppcheck
      run: sudo apt-get update && sudo apt-get install -y cppcheck

    - name: Run cppcheck
      run: |
        cppcheck --enable=all --inconclusive --suppress=missingIncludeSystem \
          --suppress=unmatchedSuppression --suppress=unusedFunction \
          --suppress=constVariablePointer --suppress=constParameterPointer \
          --suppress=constParameterCallback --suppress=knownConditionTrueFalse \
          --suppress=variableScope --suppress=funcArgNamesDifferent \
          --suppress=redundantAssignment --suppress=unreadVariable \
          --suppress=unreadVariable:src/toml.c --suppress=unreadVariable:src/server.c \
          --suppress=ctunullpointer:src/cJSON.c --suppress=unknownMacro:src/cJSON.c \
          --suppress=toomanyconfigs --suppress=missingInclude \
          --suppress=staticFunction --error-exitcode=1 \
          --std=c11 --language=c \
          -Iinclude \
          src/*.c strategies/*.c

  frontend-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Type check and Build
      working-directory: frontend
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-and-test, static-analysis, frontend-build]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false
        tags: sso-system:test
