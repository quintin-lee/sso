name: C/C++ CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsqlite3-dev libsodium-dev libssl-dev libcurl4-openssl-dev

    - name: Build the project
      run: make

    - name: Run Demo / Test Suite
      # Note: Since the demo expects a terminal or runs indefinitely, we might need to 
      # limit its execution or provide dummy input if it blocks.
      # For now, we assume `./sso_system` runs the demo and exits. If it doesn't,
      # you might need to add a command-line flag (e.g. `./sso_system --test`) to just
      # run unit tests in the future.
      run: |
        # Run the demo, which returns 0 on success.
        # We redirect stdin from /dev/null in case it tries to read from the console.
        ./sso_system < /dev/null

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: sso-system:test
