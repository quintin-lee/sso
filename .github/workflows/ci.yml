name: C/C++ CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libsqlite3-dev libsodium-dev libssl-dev libcurl4-openssl-dev

    - name: Build the project
      run: make

    - name: Build tests and run test suite
      run: make test

    - name: Run demo (smoke test)
      run: |
        # Run the demo, which returns 0 on success.
        # We redirect stdin from /dev/null in case it tries to read from the console.
        ./sso_system < /dev/null

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: sso-system:test
